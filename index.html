<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Degustação Meditativa · Alegria · Simplicitude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold:  #D4A843;
      --amber: #E8793A;
      --cream: #F5EDD8;
      --dark:  #1A0F05;
      --muted: rgba(245,237,216,0.55);
    }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Jost',sans-serif; color:var(--cream); }

    #camera {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; z-index:0;
    }
    #three-canvas {
      position:fixed; inset:0; width:100%; height:100%;
      z-index:1; pointer-events:none;
    }
    #ui {
      position:fixed; inset:0; z-index:3; pointer-events:none;
      display:flex; flex-direction:column; align-items:center;
      justify-content:flex-end; padding-bottom:52px;
    }
    #phase-label {
      font-family:'Cormorant Garamond',serif; font-size:17px;
      font-style:italic; font-weight:300; color:var(--cream);
      text-align:center; line-height:1.7; max-width:270px;
      margin-bottom:20px; opacity:0; transform:translateY(8px);
      transition:opacity 1.8s ease, transform 1.8s ease;
      text-shadow:0 0 30px rgba(0,0,0,0.9), 0 2px 12px rgba(0,0,0,0.7);
    }
    #phase-label.visible { opacity:1; transform:translateY(0); }
    #audio-bar {
      width:160px; height:1px; background:rgba(245,237,216,0.15);
      overflow:hidden; opacity:0; transition:opacity 1s;
    }
    #audio-bar.visible { opacity:1; }
    #audio-progress { height:100%; width:0%; background:var(--gold); transition:width 0.5s linear; }

    /* WELCOME */
    #welcome {
      position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:var(--dark);
      padding:48px 36px; text-align:center; transition:opacity 1.4s ease;
    }
    #welcome.hidden { opacity:0; pointer-events:none; }
    .logo { font-size:10px; font-weight:200; letter-spacing:0.38em; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:48px; }
    .w-title { font-family:'Cormorant Garamond',serif; font-size:clamp(42px,11vw,58px); font-weight:300; font-style:italic; color:var(--cream); line-height:1.05; margin-bottom:6px; }
    .w-sub   { font-size:10px; font-weight:200; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold); margin-bottom:44px; }
    .w-desc  { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:300; font-style:italic; color:var(--muted); line-height:1.8; max-width:290px; margin-bottom:52px; }
    .btn-start {
      font-size:10px; font-weight:300; letter-spacing:0.38em; text-transform:uppercase;
      color:var(--dark); background:var(--gold); border:none; padding:17px 44px;
      cursor:pointer; transition:background 0.3s, transform 0.2s;
    }
    .btn-start:active { background:var(--amber); transform:scale(0.97); }
    .w-note { font-size:9px; font-weight:200; letter-spacing:0.15em; color:var(--muted); margin-top:22px; opacity:0.5; }

    /* END */
    #end-screen {
      position:fixed; inset:0; z-index:9; background:rgba(26,15,5,0.88);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:48px 36px; opacity:0; pointer-events:none; transition:opacity 2s ease;
    }
    #end-screen.visible { opacity:1; pointer-events:all; }
    .e-sub   { font-size:10px; font-weight:200; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
    .e-title { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,10vw,50px); font-weight:300; font-style:italic; color:var(--cream); margin-bottom:24px; }
    .e-msg   { font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; color:var(--muted); max-width:280px; line-height:1.8; }
    .btn-restart {
      font-size:10px; font-weight:300; letter-spacing:0.38em; text-transform:uppercase;
      color:var(--dark); background:var(--gold); border:none; padding:15px 38px;
      cursor:pointer; margin-top:44px; transition:background 0.3s;
    }
  </style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui">
  <p id="phase-label"></p>
  <div id="audio-bar"><div id="audio-progress"></div></div>
</div>

<div id="welcome">
  <p class="logo">Simplicitude · Forest to Factory</p>
  <h1 class="w-title">Alegria</h1>
  <p class="w-sub">Degustação Meditativa</p>
  <p class="w-desc">Uma experiência sensorial e emocional.<br/>Tenha ao seu alcance um pedaço do chocolate Alegria.</p>
  <button class="btn-start" id="btn-start">Iniciar experiência</button>
  <p class="w-note">Ative o som · Permita o uso da câmera</p>
</div>

<div id="end-screen">
  <p class="e-sub">Simplicitude · Alegria</p>
  <h2 class="e-title">Gratidão</h2>
  <p class="e-msg">Leve consigo essa alegria e vitalidade para o resto do seu dia.</p>
  <button class="btn-restart" onclick="location.reload()">Repetir experiência</button>
</div>

<audio id="audio" src="audio/alegria.mp3" preload="auto"></audio>

<script>
// ── PHASES ──────────────────────────────────────────────
const PHASES = [
  { start:0,   end:10,  label:'',                                              mode:'idle'   },
  { start:10,  end:43,  label:'Encontre um local confortável\ne esteja presente.', mode:'gentle' },
  { start:43,  end:108, label:'Inspire profundamente…\nExale lentamente…',         mode:'breath' },
  { start:108, end:161, label:'Sinta a textura.\nO aroma que ele exhala.',          mode:'aroma'  },
  { start:161, end:233, label:'Laranja · Cardamomo · Cacau\nEnergia e vitalidade.', mode:'warm'   },
  { start:233, end:266, label:'Seco ao sol,\nabsorvendo a energia divina.',          mode:'solar'  },
  { start:266, end:322, label:'Sinta a alegria crescendo,\nirradiando ao seu redor.',mode:'burst'  },
];

// ── THREE.JS ────────────────────────────────────────────
const canvas3d = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas:canvas3d, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const cam   = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 200);

function onResize() {
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
}
onResize();
window.addEventListener('resize', onResize);

// ── GYROSCOPE ───────────────────────────────────────────
let gyroX=0, gyroY=0, tGyroX=0, tGyroY=0;

function initGyro() {
  const listen = () => window.addEventListener('deviceorientation', e => {
    tGyroX =  (e.gamma||0) / 35;
    tGyroY = ((e.beta ||0) - 45) / 55;
  });
  if (typeof DeviceOrientationEvent!=='undefined' &&
      typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission().then(r=>{ if(r==='granted') listen(); }).catch(()=>{});
  } else { listen(); }
}

// ── PARTICLES ───────────────────────────────────────────
const N = 900;
const pGeo  = new THREE.BufferGeometry();
const pPos  = new Float32Array(N*3);
const pCol  = new Float32Array(N*3);
const pSz   = new Float32Array(N);
const pVel  = new Float32Array(N*3);
const pPh   = new Float32Array(N);

const palette = [
  [0.831,0.659,0.263], // gold
  [0.910,0.475,0.227], // amber
  [0.961,0.929,0.847], // cream
  [1.000,0.820,0.376], // yellow
  [0.784,0.475,0.255], // bronze
];

for(let i=0;i<N;i++){
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos(2*Math.random()-1);
  const r  = 4 + Math.random()*13;
  pPos[i*3]   = r*Math.sin(ph)*Math.cos(th);
  pPos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
  pPos[i*3+2] = -(2 + Math.random()*11);
  const c = palette[Math.floor(Math.random()*palette.length)];
  pCol[i*3]=c[0]; pCol[i*3+1]=c[1]; pCol[i*3+2]=c[2];
  pSz[i] = 4 + Math.random()*20;
  pVel[i*3]   = (Math.random()-0.5)*0.004;
  pVel[i*3+1] = 0.003 + Math.random()*0.006;
  pVel[i*3+2] = (Math.random()-0.5)*0.002;
  pPh[i] = Math.random()*Math.PI*2;
}

pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol,3));
pGeo.setAttribute('size',     new THREE.BufferAttribute(pSz,1));

const pMat = new THREE.ShaderMaterial({
  uniforms:{ opacity:{value:0.0} },
  vertexShader:`
    attribute float size; attribute vec3 color; varying vec3 vCol; varying float vFade;
    void main(){
      vCol=color;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=size*(260.0/-mv.z);
      gl_Position=projectionMatrix*mv;
      vFade=clamp(1.0-length(mv.xyz)/22.0,0.0,1.0);
    }`,
  fragmentShader:`
    uniform float opacity; varying vec3 vCol; varying float vFade;
    void main(){
      float d=length(gl_PointCoord-vec2(0.5));
      if(d>0.5) discard;
      float a=pow(1.0-d*2.0,2.0);
      gl_FragColor=vec4(vCol, a*opacity*vFade);
    }`,
  transparent:true, depthWrite:false,
  blending:THREE.AdditiveBlending, vertexColors:true,
});

const pMesh = new THREE.Points(pGeo, pMat);
scene.add(pMesh);

// ── RINGS ────────────────────────────────────────────────
const ringGrp = new THREE.Group();
ringGrp.position.z = -6;
scene.add(ringGrp);

function makeRing(r, tube, col, opacity=0){
  const m = new THREE.MeshBasicMaterial({color:col,transparent:true,opacity});
  const mesh = new THREE.Mesh(new THREE.TorusGeometry(r,tube,16,120),m);
  ringGrp.add(mesh); return m;
}
const rMat1 = makeRing(1.6, 0.009, 0xD4A843);
const rMat2 = makeRing(1.0, 0.006, 0xFFD060);
const rMat3 = makeRing(2.3, 0.004, 0xE8793A);

// ── ORBS ─────────────────────────────────────────────────
const orbGrp = new THREE.Group();
scene.add(orbGrp);
const orbData = [];
for(let i=0;i<14;i++){
  const ang = (i/14)*Math.PI*2;
  const rad = 1.3 + Math.random()*2.8;
  const dep = -(3 + Math.random()*9);
  const c = palette[Math.floor(Math.random()*palette.length)];
  const mat = new THREE.MeshBasicMaterial({color:new THREE.Color(c[0],c[1],c[2]),transparent:true,opacity:0});
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.05+Math.random()*0.13,8,8),mat);
  mesh.position.set(Math.cos(ang)*rad, Math.sin(ang)*rad+(Math.random()-0.5)*1.5, dep);
  orbGrp.add(mesh);
  orbData.push({mesh,mat,ang,rad,dep,spd:0.001+Math.random()*0.003,ph:Math.random()*Math.PI*2});
}

// ── SUN ──────────────────────────────────────────────────
const sunGrp = new THREE.Group();
sunGrp.position.set(0,0.3,-7);
scene.add(sunGrp);

function addSunSphere(r, col, side=THREE.FrontSide){
  const m = new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0,side});
  sunGrp.add(new THREE.Mesh(new THREE.SphereGeometry(r,16,16),m));
  return m;
}
const sMat1 = addSunSphere(0.20, 0xFFE880);
const sMat2 = addSunSphere(0.60, 0xD4A843, THREE.BackSide);
const sMat3 = addSunSphere(1.20, 0xE8793A, THREE.BackSide);

// Rays
const rayMats = [];
for(let i=0;i<18;i++){
  const a = (i/18)*Math.PI*2;
  const pts = [
    new THREE.Vector3(Math.cos(a)*0.65,Math.sin(a)*0.65,0),
    new THREE.Vector3(Math.cos(a)*2.2, Math.sin(a)*2.2, 0),
  ];
  const m = new THREE.LineBasicMaterial({color:0xFFD060,transparent:true,opacity:0});
  sunGrp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),m));
  rayMats.push(m);
}

// ── MODE CONFIG ──────────────────────────────────────────
const modes = {
  idle:   {p:0.00, o:0.00, r:0.00, sun:false},
  gentle: {p:0.22, o:0.12, r:0.00, sun:false},
  breath: {p:0.28, o:0.28, r:0.70, sun:false},
  aroma:  {p:0.42, o:0.40, r:0.00, sun:false},
  warm:   {p:0.58, o:0.55, r:0.00, sun:false},
  solar:  {p:0.55, o:0.50, r:0.25, sun:true },
  burst:  {p:0.85, o:0.85, r:0.45, sun:true },
};

let mode = 'idle';
let breathT = 0;
const clock = new THREE.Clock();
let t = 0;

function lerp(a,b,s){ return a+(b-a)*s; }

// ── RENDER LOOP ──────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta(); t += dt;
  const cfg = modes[mode]||modes.idle;

  // Gyro smoothing + camera tilt
  gyroX = lerp(gyroX, tGyroX, 0.04);
  gyroY = lerp(gyroY, tGyroY, 0.04);
  cam.rotation.y = gyroX * 0.20;
  cam.rotation.x = gyroY * 0.14;

  // Particle opacity
  pMat.uniforms.opacity.value = lerp(pMat.uniforms.opacity.value, cfg.p, 0.012);

  // Drift particles
  for(let i=0;i<N;i++){
    pPos[i*3]   += pVel[i*3]   + Math.sin(t*0.4+pPh[i])*0.001;
    pPos[i*3+1] += pVel[i*3+1];
    pPos[i*3+2] += pVel[i*3+2];
    if(pPos[i*3+1]>13) pPos[i*3+1]=-13;
  }
  pGeo.attributes.position.needsUpdate=true;
  pMesh.rotation.y += 0.0006 + gyroX*0.0015;
  pMesh.rotation.x  = gyroY*0.08;

  // Breathing ring scale
  if(cfg.r > 0){
    breathT += dt;
    const cy = breathT % 11;
    let bs = cy<4 ? 1+0.38*(cy/4) : cy<5 ? 1.38 : 1.38-0.38*((cy-5)/6);
    ringGrp.scale.setScalar(lerp(ringGrp.scale.x, bs, 0.04));
  } else {
    ringGrp.scale.setScalar(lerp(ringGrp.scale.x, 1.0, 0.03));
  }

  ringGrp.rotation.z += 0.002;
  ringGrp.rotation.x = gyroY*0.16;
  ringGrp.rotation.y = gyroX*0.16;
  rMat1.opacity = lerp(rMat1.opacity, cfg.r*0.9, 0.018);
  rMat2.opacity = lerp(rMat2.opacity, cfg.r*0.55, 0.018);
  rMat3.opacity = lerp(rMat3.opacity, cfg.r*0.35, 0.018);

  // Orbs
  orbData.forEach(d=>{
    const a = d.ang + t*d.spd;
    d.mesh.position.x = Math.cos(a)*d.rad + gyroX*0.35;
    d.mesh.position.y = Math.sin(a)*d.rad + Math.sin(t*0.5+d.ph)*0.25 - gyroY*0.25;
    d.mat.opacity = lerp(d.mat.opacity, cfg.o*(0.4+0.6*Math.abs(Math.sin(t*0.7+d.ph))), 0.012);
  });

  // Sun
  const sv = cfg.sun ? 1:0;
  const sp = cfg.sun ? 0.85+0.15*Math.sin(t*1.8) : 0;
  sMat1.opacity = lerp(sMat1.opacity, sv*0.95, 0.012);
  sMat2.opacity = lerp(sMat2.opacity, sp*0.22, 0.012);
  sMat3.opacity = lerp(sMat3.opacity, sp*0.07, 0.012);
  sunGrp.rotation.z += 0.005;
  sunGrp.position.x  = gyroX*0.35;
  sunGrp.position.y  = 0.3 - gyroY*0.25;
  const rOp = sv*(0.28+0.14*Math.sin(t*1.3));
  rayMats.forEach(m=>{ m.opacity = lerp(m.opacity, rOp, 0.012); });

  if(mode==='burst'){
    sunGrp.scale.setScalar(1+0.09*Math.sin(t*2.6));
  }

  renderer.render(scene,cam);
}

// ── PHASE ENGINE ─────────────────────────────────────────
let curPhase = -1;
const pLabel  = document.getElementById('phase-label');
const aBar    = document.getElementById('audio-bar');
const aProgress = document.getElementById('audio-progress');

function applyPhase(p){
  mode = p.mode;
  if(p.label){ pLabel.innerHTML=p.label.replace(/\n/g,'<br/>'); pLabel.classList.add('visible'); }
  else         pLabel.classList.remove('visible');
}

function checkPhase(sec){
  for(let i=0;i<PHASES.length;i++){
    const p=PHASES[i];
    if(sec>=p.start && sec<p.end){ if(i!==curPhase){curPhase=i;applyPhase(p);} return; }
  }
}

// ── CAMERA ───────────────────────────────────────────────
async function startCamera(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280}}, audio:false
    });
    const v=document.getElementById('camera');
    v.srcObject=s; await v.play();
  } catch(e){ console.warn('Camera:', e); }
}

// ── BOOT ─────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async()=>{
  await startCamera();
  initGyro();

  const w=document.getElementById('welcome');
  w.classList.add('hidden');
  setTimeout(()=>w.style.display='none',1500);

  aBar.classList.add('visible');
  animate();

  const audio=document.getElementById('audio');
  audio.play().catch(()=>audio.play());

  audio.addEventListener('timeupdate',()=>{
    const sec=audio.currentTime;
    aProgress.style.width=((sec/audio.duration)*100)+'%';
    checkPhase(sec);
  });

  audio.addEventListener('ended',()=>{
    mode='idle';
    pLabel.classList.remove('visible');
    aBar.classList.remove('visible');
    setTimeout(()=>document.getElementById('end-screen').classList.add('visible'),1500);
  });
});
</script>
</body>
</html>
